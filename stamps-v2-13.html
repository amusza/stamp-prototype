<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stamp.</title>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Beth+Ellen&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   RESET
═══════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #888c96;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Yuji Syuku', serif;
}

/* ═══════════════════════════════
   PHONE SHELL
═══════════════════════════════ */
.phone {
  width: 393px;
  height: 852px;
  border-radius: 52px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
  box-shadow:
    0 60px 140px rgba(0,0,0,0.45),
    0 0 0 1px rgba(0,0,0,0.15),
    inset 0 0 0 1px rgba(255,255,255,0.06);
  background: #2f486d;
}

/* ═══════════════════════════════
   SCREENS
═══════════════════════════════ */
.screen {
  position: absolute;
  inset: 0;
  width: 393px; /* explicit — no overflow surprises */
  height: 852px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.38s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}
.screen.enter {
  animation: screenIn 0.42s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes screenIn {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════
   PAPER BG  — fills screen exactly
═══════════════════════════════ */
.paper-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
  user-select: none;
}

/* ═══════════════════════════════
   STATUS BAR
═══════════════════════════════ */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 56px;
  z-index: 20;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px 0;
}
.status-time {
  font-family: -apple-system, sans-serif;
  font-size: 17px; font-weight: 600;
  color: #2c2c2c; letter-spacing: -0.3px;
}
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons img { height: 12px; display: block; }
.status-icons .s-battery { height: 13px; }
.status-bar.white .status-time { color: #fff; }
.status-bar.white .status-icons img { filter: brightness(10); }

/* ═══════════════════════════════
   OVAL BUTTON — shared
   Two images: default outline + touchdown filled
   On press: default fades out, touchdown fades in
═══════════════════════════════ */
.oval-btn {
  position: relative;
  display: block;
  cursor: pointer;
  border: none; background: none; padding: 0;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  width: 257px; height: 80px;
}
/* Both images sit on top of each other, full size */
.oval-btn .ob-default,
.oval-btn .ob-pressed {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  display: block;
  pointer-events: none;
  transition: opacity 0.15s ease;
}
.oval-btn .ob-pressed { opacity: 0; }

/* Label sits above both images */
.oval-btn .ob-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Yuji Syuku', serif;
  font-size: 18px; color: #2f486d;
  transition: color 0.15s ease;
  pointer-events: none; user-select: none;
  z-index: 1;
}

/* Pressed state: swap images, white text */
.oval-btn.pressed .ob-default { opacity: 0; }
.oval-btn.pressed .ob-pressed  { opacity: 1; }
.oval-btn.pressed .ob-label    { color: #fff; }

/* ═══════════════════════════════
   SPLASH
═══════════════════════════════ */
#splash { background: #2f486d; }

.splash-logo {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 156px;
  opacity: 0;
  animation: splashIn 1s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
}
@keyframes splashIn {
  from { opacity: 0; transform: translate(-50%, calc(-50% + 8px)) scale(0.94); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* ═══════════════════════════════
   MAIN
═══════════════════════════════ */
/* stamp. logo — centered */
.main-logo {
  position: absolute;
  top: 16.8%; /* ~143px / 852px */
  left: 0; right: 0;
  text-align: center;
  pointer-events: none;
}
.main-logo img {
  width: 108px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.15s forwards;
}

/* handwriting — left: calc(20% + 27.73px) on 393px = ~106px */
.main-handwriting {
  position: absolute;
  top: 29.1%;
  left: calc(20% + 28px); /* exact Figma value */
  width: 175px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.35s forwards;
}
.main-underline {
  position: absolute;
  top: 44.1%; /* ~376px / 852px */
  left: calc(20% + 30px);
  width: 183px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.45s forwards;
}

/* tagline — centered, full width with padding */
.main-tagline {
  position: absolute;
  top: 65.4%; /* ~557px / 852px */
  left: 0; right: 0;
  padding: 0 28px;
  text-align: center;
  color: #2f486d;
  font-size: 20px;
  line-height: 28px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.55s forwards;
}

/* begin button — centered */
.main-btn {
  position: absolute;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%);
  width: 257px; height: 80px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.75s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* btn-wrap needs translateX(-50%) preserved */
.main-btn { animation: fadeUpBtn 0.6s ease 0.75s forwards; }
@keyframes fadeUpBtn {
  from { opacity: 0; transform: translateX(-50%) translateY(14px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ═══════════════════════════════
   PAGE EMPTY
═══════════════════════════════ */
/* Title + pencil */
.page-header {
  position: absolute;
  top: 72px; left: 20px; right: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-title-group {
  display: flex; align-items: center; gap: 8px;
}
.page-title {
  font-family: 'Beth Ellen', cursive;
  font-size: 22px; color: #2f486d;
  outline: none;
  border-bottom: 1.5px solid transparent;
  transition: border-color 0.2s;
  caret-color: #2f486d;
  max-width: 240px;
}
.page-title:focus { border-color: rgba(47,72,109,0.3); }
.edit-btn {
  background: none; border: none; padding: 4px;
  cursor: pointer; opacity: 0.5;
  display: flex; align-items: center;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.edit-btn:active { opacity: 1; }
.edit-btn svg { width: 22px; height: 22px; display: block; }

/* settings button — kółko (outer) + zębatka (inner) z Figmy */
.settings-btn {
  width: 39px; height: 41px;
  background: none; border: none; padding: 0;
  cursor: pointer; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
  display: block;
}
.settings-btn:active { opacity: 0.6; }
.settings-btn svg { display: block; width: 39px; height: 41px; }
.s-icon-outer, .s-icon-inner { display: none; }

/* empty state */
.empty-text {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  color: #2f486d;
  font-size: 20px; line-height: 28px;
  pointer-events: none;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.2s forwards;
}

/* stamps grid */
.stamps-grid {
  position: absolute;
  top: 130px; left: 16px; right: 16px; bottom: 140px;
  display: none;
  flex-wrap: wrap;
  gap: 10px;
  align-content: flex-start;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.stamps-grid::-webkit-scrollbar { display: none; }
.stamp-card {
  width: calc(50% - 5px);
  aspect-ratio: 1;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 2px 12px rgba(47,72,109,0.12);
  animation: stampPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes stampPop {
  from { opacity: 0; transform: scale(0.78) rotate(-4deg); }
  to   { opacity: 1; transform: scale(1) rotate(0deg); }
}
.stamp-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.stamp-date {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(47,72,109,0.5));
  padding: 14px 8px 5px;
  font-size: 10px; color: #fff;
  letter-spacing: 0.06em; text-align: center;
}

/* page bottom btn */
.page-btn {
  position: absolute;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%);
  width: 257px; height: 80px;
}

/* ═══════════════════════════════
   SETTINGS PANEL (overlay)
═══════════════════════════════ */
#settings-overlay {
  position: absolute;
  inset: 0;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.28s ease;
}
#settings-overlay.open {
  pointer-events: all;
  opacity: 1;
}

.settings-dim {
  position: absolute;
  inset: 0;
  background: rgba(47, 72, 109, 0.20);
  cursor: pointer;
}

/* Card wrapper — slides in, NO filter here (would distort text) */
.settings-card-wrap {
  position: absolute;
  top: 120px; left: 16px; right: 16px;
  transform: translateY(-18px) scale(0.97);
  opacity: 0;
  transition: transform 0.38s cubic-bezier(0.22,1,0.36,1), opacity 0.28s ease;
}
#settings-overlay.open .settings-card-wrap {
  transform: translateY(0) scale(1);
  opacity: 1;
}

/* The white card — torn effect via ::before pseudo-element
   CSS filter only applies to that layer, text children are unaffected */
.settings-card {
  background: #fff;
  border-radius: 9px;
  position: relative;
  isolation: isolate;
  box-shadow: 0 4px 24px rgba(47,72,109,0.13);
}
/* Torn paper background layer — filter ONLY distorts this shape, not the text */
.settings-card::before {
  content: '';
  position: absolute;
  inset: -5px;
  background: #fff;
  border-radius: 10px;
  z-index: -1;
  filter: url(#torn-paper);
}

/* Settings rows */
.settings-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 20px 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.14s;
  position: relative;
}
.settings-row:active { background: rgba(47,72,109,0.04); }
.settings-row + .settings-row::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1px;
  background: rgba(47,72,109,0.13);
}
.settings-row h3 {
  font-size: 20px; color: #2f486d;
  font-weight: 400; line-height: 30px;
}
.settings-row p {
  font-size: 11px;
  color: rgba(47,72,109,0.7);
  margin-top: -3px;
  letter-spacing: 0.02em;
}
.row-text { flex: 1; }

/* Toggle */
.toggle {
  flex-shrink: 0;
  margin-top: 7px;
  width: 52px; height: 28px;
  border-radius: 999px;
  background: #a7ae89;
  position: relative;
  cursor: pointer;
  transition: background 0.28s;
  -webkit-tap-highlight-color: transparent;
}
.toggle.off { background: rgba(47,72,109,0.18); }
.toggle-knob {
  position: absolute;
  top: 3px; right: 3px;
  width: 22px; height: 22px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.22);
  transition:
    right 0.26s cubic-bezier(0.34,1.56,0.64,1),
    left  0.26s cubic-bezier(0.34,1.56,0.64,1);
}
.toggle.off .toggle-knob { right: auto; left: 3px; }

/* ═══════════════════════════════
   LOADING OVERLAY
═══════════════════════════════ */
#loading {
  position: fixed; inset: 0;
  background: #2f486d;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 18px;
  transition: opacity 0.6s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.ld-logo {
  font-family: 'Courier New', monospace;
  font-size: 22px; letter-spacing: 0.22em;
  color: rgba(255,255,255,0.9);
}
.ld-dots { display: flex; gap: 6px; }
.ld-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.45);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.ld-dot:nth-child(2) { animation-delay: 0.2s; }
.ld-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<!-- SVG filter definitions — torn paper effect -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="torn-paper" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="4" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Loading -->
<div id="loading">
  <div class="ld-logo">stamp.</div>
  <div class="ld-dots">
    <div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div>
  </div>
</div>

<div class="phone">

  <!-- ════════════════ SPLASH ════════════════ -->
  <div class="screen active" id="splash">
    <div class="status-bar white">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <img data-key="cellular_w" src="" alt="">
        <img data-key="wifi_w" src="" alt="">
        <img data-key="battery_w" src="" class="s-battery" alt="">
      </div>
    </div>
    <img data-key="splash_logo" src="" alt="stamp." class="splash-logo">
  </div>

  <!-- ════════════════ MAIN ════════════════ -->
  <div class="screen" id="main">
    <img data-key="paper_main" src="" alt="" class="paper-bg">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <img data-key="cellular" src="" alt="">
        <img data-key="wifi" src="" alt="">
        <img data-key="battery" src="" class="s-battery" alt="">
      </div>
    </div>

    <div class="main-logo">
      <img data-key="logo" src="" alt="stamp.">
    </div>

    <img data-key="handwriting" src="" alt="one small moment a day." class="main-handwriting">
    <img data-key="underline"   src="" alt="" class="main-underline">

    <div class="main-tagline">
      A quiet place<br>for small things you notice.<br>One stamp a day.<br><br>No feed. No likes. No pressure
    </div>

    <div class="oval-btn main-btn" id="btn-begin">
      <img data-key="btn_circle"    src="" alt="" class="ob-default">
      <img data-key="btn_circle_td" src="" alt="" class="ob-pressed">
      <span class="ob-label">Begin</span>
    </div>
  </div>

  <!-- ════════════════ PAGE ════════════════ -->
  <div class="screen" id="page">
    <img data-key="paper_page" src="" alt="" class="paper-bg">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <img data-key="cellular" src="" alt="">
        <img data-key="wifi" src="" alt="">
        <img data-key="battery" src="" class="s-battery" alt="">
      </div>
    </div>

    <div class="page-header">
      <div class="page-title-group">
        <span
          id="page-title"
          class="page-title"
          contenteditable="false"
          spellcheck="false"
        >favourite things</span>

362C19.5382 4.3287 19.247 4.10262 19.0212 3.93456C18.9061 3.84892 18.8038 3.77527 18.7302 3.72295C18.6933 3.69676 18.6635 3.67583 18.6428 3.66132L18.6186 3.6445ZM3.80617 18.361C3.31137 18.2891 3.31041 18.2958 3.31041 18.2958L3.80617 18.361ZM16.9296 6.1183L16.9484 6.13724C17.1263 6.31647 17.3096 6.49947 17.3723 6.5577C17.5276 6.70192 17.847 6.98855 18.1316 7.24253L18.3 7.39273C18.5886 7.08797 18.9191 6.72476 19.2099 6.40081C19.3798 6.21146 19.5347 6.03718 19.6575 5.89836L19.6279 5.86351C19.4534 5.65855 19.2434 5.42351 19.0722 5.26274C18.8975 5.09879 18.6444 4.90069 18.4241 4.73679L18.3864 4.70876C18.0632 5.03821 17.7566 5.32907 17.4606 5.60977L17.3063 5.7562C17.1798 5.87655 17.0546 5.99633 16.9296 6.1183Z" fill="#2F486D"/> </svg>
        </button>
      </div>

<input type="file" accept="image/*" id="photo-upload" onchange="handlePhotoUpload(event)">

<script>
/* ─── ASSETS ──────────────────────────────────── */
const ASSETS = {
  splash_logo:     "https://www.figma.com/api/mcp/asset/652aebe9-b437-4a8d-a4ac-d2c9dfea5a5c",
  paper_main:      "https://www.figma.com/api/mcp/asset/94526e24-f3a2-4592-a270-9ed51e24013b",
  logo:            "https://www.figma.com/api/mcp/asset/5f200632-a199-44e7-8700-7cc5dbcc5934",
  handwriting:     "https://www.figma.com/api/mcp/asset/a193fd99-a38f-4aac-8e5a-a01229f96499",
  underline:       "https://www.figma.com/api/mcp/asset/5dd0c418-9f67-4302-b710-d418e0c123b5",
  btn_circle:      "https://www.figma.com/api/mcp/asset/274e04aa-382c-4bfa-ac2b-0a975f287229",
  btn_circle_td:   "https://www.figma.com/api/mcp/asset/331282a7-0b79-4d04-8567-fe1547a69a38",
  paper_page:      "https://www.figma.com/api/mcp/asset/078e559c-187e-4931-9490-1ebf195ab65c",
  btn_circle_page: "https://www.figma.com/api/mcp/asset/274e04aa-382c-4bfa-ac2b-0a975f287229",
  btn_circle_page_td: "https://www.figma.com/api/mcp/asset/331282a7-0b79-4d04-8567-fe1547a69a38",
  settings_icon_outer: "https://www.figma.com/api/mcp/asset/7b48b486-4d04-42b8-a65f-88b82fcb3e21",
  settings_icon_inner: "https://www.figma.com/api/mcp/asset/f489571f-9737-41c0-bf5d-9b846456c778",
  cellular:        "https://www.figma.com/api/mcp/asset/4581db57-13f8-47a9-864a-81956d4e68fd",
  wifi:            "https://www.figma.com/api/mcp/asset/8024fa14-2ab9-4bea-86f5-62c4ebd04231",
  battery:         "https://www.figma.com/api/mcp/asset/8d5104f2-b1dc-4314-9c19-aa545a48c8a2",
  cellular_w:      "https://www.figma.com/api/mcp/asset/880dd0c6-c52f-4e50-8430-9a9c2b2dc4d2",
  wifi_w:          "https://www.figma.com/api/mcp/asset/a1e05875-10f8-49f2-a548-9cc503858906",
  battery_w:       "https://www.figma.com/api/mcp/asset/39464d07-f5a8-47ab-b0c5-130755b50fc7",
};

/* ─── INDEXEDDB CACHE ─────────────────────────── */
const DB_NAME = 'stamps_v5', STORE = 'imgs';
function openDB() {
  return new Promise((res,rej) => {
    const r = indexedDB.open(DB_NAME,1);
    r.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    r.onsuccess = e => res(e.target.result);
    r.onerror   = () => rej(r.error);
  });
}
function dbGet(db,k){ return new Promise(res=>{ const r=db.transaction(STORE,'readonly').objectStore(STORE).get(k); r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null); }); }
function dbSet(db,k,v){ return new Promise(res=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(v,k); tx.oncomplete=res; tx.onerror=res; }); }
async function toDataUrl(url){
  const r=await fetch(url), b=await r.blob();
  return new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(b); });
}

/* ─── BOOT ────────────────────────────────────── */
let db=null;
async function boot(){
  try { db=await openDB(); } catch(e){}
  const keys=Object.keys(ASSETS);
  await Promise.all(keys.map(async k=>{
    const url=ASSETS[k];
    if(db){ const c=await dbGet(db,k); if(c){ applyImg(k,c); return; } }
    try{
      const d=await toDataUrl(url);
      applyImg(k,d);
      if(db) await dbSet(db,k,d);
    } catch{ applyImg(k,url); }
  }));
  const ld=document.getElementById('loading');
  ld.classList.add('hidden');
  setTimeout(()=>ld.style.display='none',700);
  setTimeout(()=>goTo('main'), 2200);
}
function applyImg(key,src){
  document.querySelectorAll(`[data-key="${key}"]`).forEach(el=>el.src=src);
}

/* ─── NAVIGATION ──────────────────────────────── */
function goTo(id){
  const prev=document.querySelector('.screen.active');
  const next=document.getElementById(id);
  if(!next||prev===next) return;
  if(prev) prev.classList.remove('active','enter');
  next.classList.remove('enter');
  void next.offsetWidth;
  if(id!=='splash') next.classList.add('enter');
  next.classList.add('active');
}

/* ─── OVAL BUTTON PRESS FEEL ──────────────────── */
function initOvalBtn(el, cb){
  if(!el) return;
  const press=e=>{ e.preventDefault(); el.classList.add('pressed'); };
  const rel=()=>{ el.classList.remove('pressed'); if(cb) setTimeout(cb,130); };
  el.addEventListener('mousedown',press);
  el.addEventListener('touchstart',press,{passive:false});
  el.addEventListener('mouseup',rel);
  el.addEventListener('touchend',rel);
  el.addEventListener('mouseleave',()=>el.classList.remove('pressed'));
}

/* ─── TITLE EDIT ──────────────────────────────── */
let editingTitle=false;
function toggleTitleEdit(){
  const t=document.getElementById('page-title');
  editingTitle=!editingTitle;
  t.contentEditable=editingTitle?'true':'false';
  if(editingTitle){
    t.focus();
    const rng=document.createRange(), sel=window.getSelection();
    rng.selectNodeContents(t); rng.collapse(false);
    sel.removeAllRanges(); sel.addRange(rng);
  } else { t.blur(); }
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&editingTitle){ e.preventDefault(); toggleTitleEdit(); }
});

/* ─── SETTINGS ────────────────────────────────── */
function openSettings(){ document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings(){ document.getElementById('settings-overlay').classList.remove('open'); }
function toggleReminder(){ document.getElementById('reminder-toggle').classList.toggle('off'); }

/* ─── PHOTO (placeholder) ─────────────────────── */
let stamps=[];
function handlePhotoUpload(e){
  const f=e.target.files[0]; if(!f) return;
  const fr=new FileReader();
  fr.onload=ev=>{ addStamp(ev.target.result); };
  fr.readAsDataURL(f);
}
function addStamp(src){
  const now=new Date();
  stamps.push({ src, date: now.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) });
  renderStamps();
  goTo('page');
}
function renderStamps(){
  const grid=document.getElementById('stamps-grid');
  const empty=document.getElementById('empty-text');
  if(stamps.length){
    empty.style.display='none';
    grid.style.display='flex';
    grid.innerHTML=stamps.map((s,i)=>`
      <div class="stamp-card" style="animation-delay:${i*0.07}s">
        <img src="${s.src}"><div class="stamp-date">${s.date}</div>
      </div>`).join('');
  } else {
    empty.style.display='';
    grid.style.display='none';
  }
}

/* ─── INIT ────────────────────────────────────── */
window.addEventListener('DOMContentLoaded',()=>{
  initOvalBtn(document.getElementById('btn-begin'), ()=>goTo('page'));
  initOvalBtn(document.getElementById('btn-make'),  ()=>document.getElementById('photo-upload').click());
  boot();
});
</script>
